spring:
  application:
    name: spring-cloud-customerservice

  datasource:
    url: jdbc:mysql://localhost:3306/BankingApplicationFeign
    username: root
    password: Verinite@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    hibernate:
      ddl-auto: update

  # Feign Client Configuration
  feign:
    client:
      config:
        creditCardService:
          url: http://localhost:8081/spring-cloud-creditcardservice/api

server:
  port: 8080

# Eureka configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
      
      
   
  zipkin:
    base-url: http://localhost:9411/
